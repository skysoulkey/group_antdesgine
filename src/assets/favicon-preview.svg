<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1677ff"/>
      <stop offset="100%" stop-color="#0958d9"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形背景（填满画布） -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- 聊天气泡（左侧） -->
  <path d="M100 148 h168 a32 32 0 0 1 32 32 v100 a32 32 0 0 1 -32 32 h-84 l-48 42 v-42 h-36 a32 32 0 0 1 -32 -32 v-100 a32 32 0 0 1 32 -32 z"
        fill="rgba(255,255,255,0.95)"/>

  <!-- 气泡内三条横线 -->
  <rect x="130" y="192" width="108" height="12" rx="6" fill="#1677ff" opacity="0.55"/>
  <rect x="130" y="220" width="76" height="12" rx="6" fill="#1677ff" opacity="0.35"/>
  <rect x="130" y="248" width="92" height="12" rx="6" fill="#1677ff" opacity="0.2"/>

  <!-- 四宫格仪表盘（右上） -->
  <g transform="translate(268, 128)">
    <rect x="0" y="0" width="148" height="148" rx="24" fill="rgba(255,255,255,0.92)"/>
    <rect x="16" y="16" width="50" height="50" rx="10" fill="#1677ff" opacity="0.8"/>
    <rect x="82" y="16" width="50" height="50" rx="10" fill="#4096ff" opacity="0.55"/>
    <rect x="16" y="82" width="50" height="50" rx="10" fill="#4096ff" opacity="0.55"/>
    <rect x="82" y="82" width="50" height="50" rx="10" fill="#1677ff" opacity="0.3"/>
  </g>

  <!-- IM 文字 -->
  <text x="256" y="404" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="76" fill="rgba(255,255,255,0.95)" letter-spacing="10">IM</text>
</svg>
